<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POM BPJS Scraper</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #2c3e50, #1a252f);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.8; font-size: 14px; }
        .content { padding: 30px; }
        
        .status-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .status-box .status {
            font-size: 14px;
            margin-top: 5px;
        }
        .connected { color: #155724; background: #d4edda; padding: 5px 10px; border-radius: 20px; display: inline-block; }
        .disconnected { color: #721c24; background: #f8d7da; padding: 5px 10px; border-radius: 20px; display: inline-block; }
        
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            letter-spacing: 2px;
        }
        input:focus { outline: none; border-color: #667eea; }
        
        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 15px;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .btn-login {
            background: linear-gradient(135deg, #28a745, #20c997);
        }
        
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        .result.show { display: block; }
        .result pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
            white-space: pre-wrap;
        }
        .success-message { background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        .error-message { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table td {
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        .data-table td:first-child {
            font-weight: bold;
            width: 35%;
            background: #f0f0f0;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .loading.show { display: block; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏦 POM BPJS Scraper</h1>
            <p>Cek Data Peserta BPJS Ketenagakerjaan</p>
        </div>
        
        <div class="content">
            <div class="status-box">
                <div id="statusText" class="status disconnected">❌ Belum Login</div>
            </div>
            
            <button id="loginBtn" class="btn-login" onclick="doLogin()">🔑 LOGIN & AMBIL SESSION</button>
            
            <div class="form-group">
                <label>📝 Nomor KPJ (11 digit)</label>
                <input type="text" id="kpj" maxlength="11" placeholder="Contoh: 22119520694" autocomplete="off">
            </div>
            
            <button id="checkBtn" onclick="checkKPJ()" disabled>🔍 CEK KPJ</button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px;">Memproses...</p>
            </div>
            
            <div class="result" id="result">
                <h3>📊 Hasil Pengecekan</h3>
                <div id="resultContent"></div>
            </div>
        </div>
    </div>

    <script>
        let isLoggedIn = false;
        
        async function doLogin() {
            const loginBtn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');
            const statusText = document.getElementById('statusText');
            
            loginBtn.disabled = true;
            loading.classList.add('show');
            statusText.innerHTML = '⏳ Login...';
            
            try {
                const response = await fetch('/login', { method: 'POST' });
                const data = await response.json();
                
                if (data.status === 'SUCCESS') {
                    isLoggedIn = true;
                    statusText.innerHTML = '✅ Login Berhasil! Siap cek KPJ.';
                    statusText.className = 'status connected';
                    document.getElementById('checkBtn').disabled = false;
                    showResult('success', data.message);
                } else {
                    statusText.innerHTML = '❌ Login Gagal';
                    statusText.className = 'status disconnected';
                    showResult('error', data.message);
                }
                
            } catch (error) {
                statusText.innerHTML = '❌ Error: ' + error.message;
                showResult('error', 'Network error: ' + error.message);
            } finally {
                loginBtn.disabled = false;
                loading.classList.remove('show');
            }
        }
        
        async function checkKPJ() {
            if (!isLoggedIn) {
                alert('Login dulu! Klik tombol LOGIN & AMBIL SESSION');
                return;
            }
            
            const kpj = document.getElementById('kpj').value.trim();
            const checkBtn = document.getElementById('checkBtn');
            const loading = document.getElementById('loading');
            
            if (!kpj || !/^\d{11}$/.test(kpj)) {
                alert('Masukkan KPJ 11 digit angka!');
                return;
            }
            
            checkBtn.disabled = true;
            loading.classList.add('show');
            
            try {
                const response = await fetch('/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ kpj: kpj })
                });
                
                const data = await response.json();
                
                if (data.status === 'SUCCESS') {
                    displayData(data.data);
                } else {
                    showResult('error', data.message || JSON.stringify(data, null, 2));
                }
                
            } catch (error) {
                showResult('error', 'Network error: ' + error.message);
            } finally {
                checkBtn.disabled = false;
                loading.classList.remove('show');
            }
        }
        
        function displayData(data) {
            const resultContent = document.getElementById('resultContent');
            
            if (data && typeof data === 'object') {
                // Coba extract data dari response
                let extractedData = data;
                if (data.data && typeof data.data === 'object') {
                    extractedData = data.data;
                }
                
                let html = '<span class="success-message">✅ Data Ditemukan!</span>';
                html += '<table class="data-table">';
                
                const fields = ['nik', 'namaLengkap', 'nama', 'kpj', 'nomorIdentitas', 'nomUpah', 'gaji', 'tanggalLahir', 'jenisKelamin', 'statusKawin', 'alamat'];
                
                for (const [key, value] of Object.entries(extractedData)) {
                    if (fields.includes(key) || key.includes('nama') || key.includes('nik') || key.includes('kpj')) {
                        let label = key;
                        if (key === 'namaLengkap') label = 'Nama Lengkap';
                        if (key === 'nomorIdentitas') label = 'NIK';
                        if (key === 'nomUpah') label = 'Gaji';
                        html += `<tr><td style="font-weight: bold">${label}</td><td>${escapeHtml(String(value))}</td></tr>`;
                    }
                }
                
                html += '赶</div>';
                resultContent.innerHTML = html;
            } else {
                resultContent.innerHTML = `<pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
            }
            
            document.getElementById('result').classList.add('show');
        }
        
        function showResult(type, message) {
            const resultContent = document.getElementById('resultContent');
            if (type === 'success') {
                resultContent.innerHTML = `<div class="success-message">✅ ${escapeHtml(message)}</div>`;
            } else {
                resultContent.innerHTML = `<div class="error-message">❌ ${escapeHtml(message)}</div>`;
            }
            document.getElementById('result').classList.add('show');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('kpj').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && isLoggedIn) checkKPJ();
        });
    </script>
</body>
</html>
