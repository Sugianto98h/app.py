<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Connector - Pine Email View</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #2c3e50, #1a252f);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.8; font-size: 14px; }
        .content { padding: 30px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            letter-spacing: 2px;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 15px;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d, #495057);
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        .result.show { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result h3 {
            margin-bottom: 15px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .result pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .status-success { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }
        .status-warning { background: #fff3cd; color: #856404; }
        .status-info { background: #d1ecf1; color: #0c5460; }
        .info-token {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            color: #0066cc;
            margin-top: 20px;
            word-break: break-all;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .loading.show { display: block; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .connection-status {
            font-size: 12px;
            margin-bottom: 15px;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
        }
        .connected { background: #d4edda; color: #155724; }
        .disconnected { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔗 Token Connector</h1>
            <p>Hubungkan token ke server asalnya (pine.email-view.com)</p>
        </div>
        
        <div class="content">
            <div id="connectionStatus" class="connection-status disconnected">
                ❌ Belum terhubung
            </div>
            
            <button id="connectBtn" class="btn-secondary" onclick="connectToServer()">🔌 KONEK KE SERVER</button>
            
            <div class="form-group">
                <label>📝 Nomor KPJ (11 digit)</label>
                <input type="text" id="kpj" maxlength="11" placeholder="Contoh: 22119520694" autocomplete="off">
            </div>
            
            <button id="checkBtn" onclick="checkKPJ()" disabled>🔍 CHECK KPJ</button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px;">Memproses...</p>
            </div>
            
            <div class="result" id="result">
                <h3>📊 Hasil</h3>
                <div id="resultContent"></div>
            </div>
            
            <div class="info-token">
                <strong>🔑 Token URL:</strong><br>
                {{ token_preview }}
                <details style="margin-top: 10px;">
                    <summary>Lihat token lengkap</summary>
                    <code style="font-size: 10px; word-break: break-all;">{{ full_token }}</code>
                </details>
            </div>
        </div>
    </div>

    <script>
        let isConnected = {{ 'true' if connection_status else 'false' }};
        
        function updateUI() {
            const statusDiv = document.getElementById('connectionStatus');
            const checkBtn = document.getElementById('checkBtn');
            
            if (isConnected) {
                statusDiv.className = 'connection-status connected';
                statusDiv.innerHTML = '✅ Terhubung ke server';
                checkBtn.disabled = false;
            } else {
                statusDiv.className = 'connection-status disconnected';
                statusDiv.innerHTML = '❌ Belum terhubung. Klik "KONEK KE SERVER"';
                checkBtn.disabled = true;
            }
        }
        
        async function connectToServer() {
            const connectBtn = document.getElementById('connectBtn');
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            const resultContent = document.getElementById('resultContent');
            
            connectBtn.disabled = true;
            loading.classList.add('show');
            resultDiv.classList.remove('show');
            
            try {
                const response = await fetch('/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    isConnected = true;
                    updateUI();
                    
                    resultContent.innerHTML = `
                        <span class="status-badge status-success">✅ CONNECTED</span>
                        <div class="success-message">${escapeHtml(data.message)}</div>
                        ${data.html_preview ? `<pre>${escapeHtml(data.html_preview)}</pre>` : ''}
                        ${data.data ? `<pre>${escapeHtml(JSON.stringify(data.data, null, 2))}</pre>` : ''}
                    `;
                    resultDiv.classList.add('show');
                } else {
                    resultContent.innerHTML = `
                        <span class="status-badge status-error">❌ GAGAL</span>
                        <div class="error-message">${escapeHtml(data.message)}</div>
                    `;
                    resultDiv.classList.add('show');
                }
                
            } catch (error) {
                resultContent.innerHTML = `
                    <span class="status-badge status-error">❌ ERROR</span>
                    <div class="error-message">Network error: ${escapeHtml(error.message)}</div>
                `;
                resultDiv.classList.add('show');
            } finally {
                connectBtn.disabled = false;
                loading.classList.remove('show');
            }
        }
        
        async function checkKPJ() {
            if (!isConnected) {
                alert('Konek ke server dulu!');
                return;
            }
            
            const kpj = document.getElementById('kpj').value.trim();
            const checkBtn = document.getElementById('checkBtn');
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            const resultContent = document.getElementById('resultContent');
            
            if (!kpj) {
                alert('Masukkan nomor KPJ!');
                return;
            }
            
            if (!/^\d{11}$/.test(kpj)) {
                alert('KPJ harus 11 digit angka!');
                return;
            }
            
            checkBtn.disabled = true;
            loading.classList.add('show');
            resultDiv.classList.remove('show');
            
            try {
                const response = await fetch('/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ kpj: kpj })
                });
                
                const data = await response.json();
                
                resultContent.innerHTML = `
                    <span class="status-badge status-info">ℹ️ INFO</span>
                    <pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>
                `;
                resultDiv.classList.add('show');
                
            } catch (error) {
                resultContent.innerHTML = `
                    <span class="status-badge status-error">❌ ERROR</span>
                    <div class="error-message">Network error: ${escapeHtml(error.message)}</div>
                `;
                resultDiv.classList.add('show');
            } finally {
                checkBtn.disabled = false;
                loading.classList.remove('show');
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initialize UI
        updateUI();
        
        // Enter key support
        document.getElementById('kpj').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && isConnected) checkKPJ();
        });
    </script>
</body>
</html>
